<!DOCTYPE html>
<html>
<head>

<title>Heavy Rainfall Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-card">

<h1>🌧 Heavy Rainfall Prediction System</h1>
<p class="subtitle">Machine Learning Based Early Flood Warning</p>

<form action="/predict" method="post">

<div class="form-grid">

<select name="state" required>
<option value="">Select State</option>
{% for s in states %}
<option value="{{s}}">{{s}}</option>
{% endfor %}
</select>

<select name="district" required>
<option value="">Select District</option>
{% for d in districts %}
<option value="{{d}}">{{d}}</option>
{% endfor %}
</select>

<input type="number" name="janfeb" placeholder="Jan – Feb Rainfall (mm)" required>

<input type="number" name="marmay" placeholder="Mar – May Rainfall (mm)" required>

<input type="number" name="junsep" placeholder="Jun – Sep Rainfall (mm)" required>

<input type="number" name="octdec" placeholder="Oct – Dec Rainfall (mm)" required>

</div>

<button class="predict-btn">Predict Rainfall</button>

</form>

</div>

</body>
</html>
